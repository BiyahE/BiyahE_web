<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BIYAHE Bus Management System</title>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #e5e7eb 0%, #fef3c7 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            color: #1f2937;
        }

        /* Centered Top Alert */
        #alertContainer {
            position: fixed;
            /* fixed on the viewport */
            top: 1rem;
            /* distance from top */
            left: 50%;
            /* center horizontally */
            transform: translateX(-50%);
            z-index: 9999;
            /* above everything */
            width: auto;
            max-width: 90%;
        }

        /* Main Container */
        .main-container {
            width: 100%;
            max-width: 1500px;
            display: flex;
            justify-content: center;
        }

        .card-wrapper {
            border-radius: 3rem;
            overflow: hidden;
            width: 100%;
            display: flex;
            height: 100%;
        }

        .auth-form-section {
            width: 45%;
            padding: 6rem 4rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
        }

        .brand-badge {
            position: absolute;
            top: 1rem;
            left: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 1px;
            font-size: 30px;
            font-weight: 900;
            color: #0b0838;
        }

        .brand-logo {
            height: 3rem;
            width: auto;
            object-fit: contain;
            display: block;
        }

        .brand-text {
            display: flex;
            flex-direction: column;
            line-height: 1;
        }

        .form-header {
            margin-bottom: 2.5rem;
            text-align: center;
        }

        .form-header h1 {
            font-size: 2.25rem;
            font-weight: 50;
            color: #0b0838;
            margin-bottom: 0.5rem;
            letter-spacing: 0.05em;
        }

        .form-header p {
            color: #6b7280;
            font-size: 1rem;
        }

        /* Form Grid Layout - Matching Register */
        .form-grid {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            padding: 0 50px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: #6b7280;
            margin-bottom: 0.5rem;
            margin-left: 0.25rem;
        }

        .input-wrapper {
            position: relative;
            height: 100%;
        }

        .form-input {
            width: 100%;
            height: 48px;
            padding: 0 1.25rem;
            border-radius: 5rem;
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            font-size: 0.95rem;
            color: #1f2937;
            transition: all 0.2s;
            font-family: inherit;
            display: flex;
            align-items: center;
        }

        .form-input:focus {
            outline: none;
            border-color: #fde338;
            box-shadow: 0 0 0 3px rgba(253, 227, 56, 0.2);
            background: white;
        }

        .form-input::placeholder {
            color: #9ca3af;
        }

        /* Password Field - Matching Register */
        .password-wrapper {
            position: relative;
            height: 48px;
        }

        .password-wrapper .form-input {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            padding-right: 3rem;
        }

        .password-toggle {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #9ca3af;
            cursor: pointer;
            font-size: 1.1rem;
            transition: color 0.2s;
            padding: 0.25rem;
            z-index: 2;
        }

        .password-toggle:hover {
            color: #6b7280;
        }

        /* Options Row - Styled to match register spacing */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 0.5rem;
            font-size: 0.875rem;
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            color: #6b7280;
            font-weight: 500;
        }

        .checkbox-wrapper input[type="checkbox"] {
            width: 1rem;
            height: 1rem;
            accent-color: #fde338;
            cursor: pointer;
        }

        .forgot-link {
            color: #6b7280;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .forgot-link:hover {
            color: #1f2937;

        }

        /* Submit Button - Matching Register */
        .btn-submit {
            width: 100%;
            height: 48px;
            background: #fde338;
            color: #0b0838;
            border: none;
            border-radius: 5rem;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-top: 0.5rem;
            font-family: inherit;
        }

        .btn-submit:hover {
            background: #fcd34d;
            transform: translateY(-1px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
        }

        .btn-submit:active {
            transform: translateY(0);
        }


        /* Right Column (Image) */
        .auth-image-section {
            width: 55%;
            padding: 0 10px 0 0;
            display: block;
        }

        .image-container {
            width: 100%;
            height: 100%;
            border-radius: 2.5rem;
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, #2a2d4a 0%, #1a1c2e 100%);
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.9;
        }

        /* Floating Cards */
        .floating-card {
            position: absolute;
            border-radius: 1rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .floating-card.yellow {
            background: #fde68a;
            top: 2.5rem;
            left: 4rem;
            padding: 1rem;
            width: 12rem;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.25rem;
        }

        .card-title {
            font-size: 0.875rem;
            font-weight: 700;
            color: #1f2937;
            line-height: 1.2;
            margin: 0;
        }

        .card-dot {
            width: 0.5rem;
            height: 0.5rem;
            background: #1f2937;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .card-time {
            font-size: 0.625rem;
            color: #4b5563;
            font-weight: 500;
        }

        .ghost-card {
            position: absolute;
            background: rgba(31, 41, 55, 0.8);
            padding: 0.75rem;
            border-radius: 0.75rem;
            width: 11rem;
            bottom: -0.5rem;
            right: -1rem;
            z-index: -1;
        }

        .ghost-card p {
            font-size: 0.5rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .meeting-card {
            position: absolute;
            bottom: 6rem;
            left: 4rem;
            background: white;
            padding: 1.25rem;
            border-radius: 1.5rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 14rem;
        }

        .meeting-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.25rem;
        }

        .meeting-title {
            font-size: 0.75rem;
            font-weight: 700;
            color: #1f2937;
        }

        .meeting-dot {
            width: 0.5rem;
            height: 0.5rem;
            background: #fde338;
            border-radius: 50%;
        }

        .meeting-time {
            font-size: 0.625rem;
            color: #9ca3af;
            margin-bottom: 1rem;
        }

        .avatar-stack {
            display: flex;
            margin-left: 0.5rem;
        }

        .avatar-stack img {
            width: 2rem;
            height: 2rem;
            border-radius: 50%;
            border: 2px solid white;
            margin-left: -0.5rem;
            object-fit: cover;
        }

        .calendar-strip {
            position: absolute;
            bottom: 6rem;
            right: 4rem;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 1.5rem;
            border-radius: 1.5rem;
            width: 18rem;
        }

        .calendar-days {
            display: flex;
            justify-content: space-between;
            text-align: center;
            color: white;
            margin-bottom: 1rem;
        }

        .calendar-day span {
            display: block;
            font-size: 0.625rem;
            opacity: 0.6;
            margin-bottom: 0.25rem;
        }

        .calendar-day strong {
            font-size: 0.875rem;
            font-weight: 600;
        }

        .calendar-pattern {
            height: 3rem;
            width: 100%;
            opacity: 0.3;
            background: repeating-linear-gradient(45deg,
                    transparent,
                    transparent 5px,
                    white 5px,
                    white 6px);
        }

        /* Alerts */
        .alert {
            padding: 1rem 1.25rem;
            border-radius: 1rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.875rem;
            margin-bottom: 1.5rem;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: #059669;
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #dc2626;
        }

        /* Loading State */
        .btn-loading {
            position: relative;
            color: transparent !important;
        }

        .btn-loading::after {
            content: '';
            position: absolute;
            width: 1.25rem;
            height: 1.25rem;
            border: 2px solid #1f2937;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }

        @keyframes spin {
            to {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .card-wrapper {
                flex-direction: column;
                min-height: auto;
            }

            .auth-form-section {
                width: 100%;
                padding: 2rem;
            }

            .auth-image-section {
                display: none;
            }

            .brand-badge {
                position: relative;
                top: 0;
                left: 0;
                margin-bottom: 1rem;
                justify-content: center;
            }

            .form-header {
                margin-top: 0;
            }
        }

        @media (max-width: 640px) {
            body {
                padding: 1rem;
            }

            .auth-form-section {
                padding: 1.5rem;
            }

            .form-header h1 {
                font-size: 1.75rem;
            }

            .form-options {
                flex-direction: column;
                gap: 0.75rem;
                align-items: flex-start;
            }
        }
    </style>
</head>

<body>
    <div class="main-container">
        <div class="card-wrapper">
            <!-- Left Side - Form -->
            <section class="auth-form-section">
                <div>
                    <div class="brand-badge">
                        <img src="images/bus-logo.png" alt="Biyahe Logo" class="brand-logo">
                        <div class="brand-text">
                            BiyahE
                        </div>
                    </div>

                    <div class="form-header">
                        <h1>Welcome back</h1>
                        <p>Sign in to your account</p>
                    </div>

                    <div id="alertContainer"></div>

                    <form id="loginForm" class="form-grid">
                        <div class="form-group">
                            <label class="form-label">Email Address</label>
                            <div class="input-wrapper">
                                <input type="email" class="form-input" id="email" placeholder="Enter your email"
                                    required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Password</label>
                            <div class="input-wrapper password-wrapper">
                                <input type="password" class="form-input" id="password"
                                    placeholder="Enter your password" required>
                                <button type="button" class="password-toggle" id="passwordToggle">
                                    <i class="fas fa-eye" id="toggleIcon"></i>
                                </button>
                            </div>
                        </div>

                        <div class="form-options">
                            <label class="checkbox-wrapper">
                                <input type="checkbox" id="rememberMe">
                                <span>Remember me</span>
                            </label>
                            <a href="forgot-password.html" class="forgot-link">Forgot password?</a>
                        </div>

                        <button type="submit" class="btn-submit">Sign In</button>
                    </form>
                </div>


            </section>

            <!-- Right Side - Image -->
            <section class="auth-image-section">
                <div class="image-container">
                    <img src="images/background.png" alt="Bus Management">

                    <div class="floating-card yellow">
                        <div class="card-header">
                            <h4 class="card-title">Route Review With Team</h4>
                            <div class="card-dot"></div>
                        </div>
                        <p class="card-time">09:30am - 10:00am</p>
                        <div class="ghost-card">
                            <p>09:30am - 10:00am</p>
                        </div>
                    </div>

                    <div class="meeting-card">
                        <div class="meeting-header">
                            <h4 class="meeting-title">Daily Dispatch</h4>
                            <div class="meeting-dot"></div>
                        </div>
                        <p class="meeting-time">12:00pm - 01:00pm</p>
                        <div class="avatar-stack">
                            <img src="https://i.pravatar.cc/150?img=1" alt="Member">
                            <img src="https://i.pravatar.cc/150?img=2" alt="Member">
                            <img src="https://i.pravatar.cc/150?img=3" alt="Member">
                            <img src="https://i.pravatar.cc/150?img=4" alt="Member">
                        </div>
                    </div>

                    <div class="calendar-strip">
                        <div class="calendar-days">
                            <div class="calendar-day"><span>Sun</span><strong>22</strong></div>
                            <div class="calendar-day"><span>Mon</span><strong>23</strong></div>
                            <div class="calendar-day"><span>Tue</span><strong>24</strong></div>
                            <div class="calendar-day"><span>Wed</span><strong>25</strong></div>
                            <div class="calendar-day"><span>Thu</span><strong>26</strong></div>
                            <div class="calendar-day"><span>Fri</span><strong>27</strong></div>
                            <div class="calendar-day"><span>Sat</span><strong>28</strong></div>
                        </div>
                        <div class="calendar-pattern"></div>
                    </div>
                </div>
            </section>
        </div>
    </div>


    <!-- Add this BEFORE any other scripts -->
    <script src="js/logger.js"></script>
    <!-- Load Supabase FIRST -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Load bcryptjs -->
    <script src="https://cdn.jsdelivr.net/npm/bcryptjs@2.4.3/dist/bcrypt.min.js"></script>

    <!-- Load auth.js AFTER libraries -->
    <script src="js/auth.js"></script>

    <script>
        // Password toggle functionality - Matching Register
        function setupPasswordToggle(inputId, toggleId, iconId) {
            const passwordInput = document.getElementById(inputId);
            const passwordToggle = document.getElementById(toggleId);
            const toggleIcon = document.getElementById(iconId);

            passwordToggle.addEventListener('click', function () {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);

                if (type === 'text') {
                    toggleIcon.classList.remove('fa-eye');
                    toggleIcon.classList.add('fa-eye-slash');
                } else {
                    toggleIcon.classList.remove('fa-eye-slash');
                    toggleIcon.classList.add('fa-eye');
                }
            });
        }

        setupPasswordToggle('password', 'passwordToggle', 'toggleIcon');

        // Simple encryption for storing password locally (basic obfuscation)
        function simpleEncrypt(text) {
            return btoa(text.split('').reverse().join(''));
        }

        function simpleDecrypt(text) {
            return atob(text).split('').reverse().join('');
        }

        // Login form handler
        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            const submitBtn = this.querySelector('.btn-submit');

            submitBtn.classList.add('btn-loading');
            submitBtn.disabled = true;

            try {
                const result = await Auth.login(email, password);

                if (result.success) {
                    showAlert('Login successful! Redirecting...', 'success');

                    if (rememberMe) {
                        localStorage.setItem('rememberedEmail', email);
                        localStorage.setItem('rememberedPassword', simpleEncrypt(password));
                        localStorage.setItem('rememberMe', 'true');
                    } else {
                        localStorage.setItem('rememberedEmail', email);
                        localStorage.removeItem('rememberedPassword');
                        localStorage.removeItem('rememberMe');
                    }

                    setTimeout(() => {
                        // Use replace() instead of href to remove login page from history
                        // Redirect to dashboard.html - the dashboard will handle role-based routing
                        window.location.replace('dashboard.html');
                    }, 800);
                } else {
                    showAlert(result.message, 'error');
                    submitBtn.classList.remove('btn-loading');
                    submitBtn.disabled = false;
                }
            } catch (error) {
                showAlert('An unexpected error occurred', 'error');
                submitBtn.classList.remove('btn-loading');
                submitBtn.disabled = false;
            }
        });

        // Show alert function
        function showAlert(message, type) {
            const container = document.getElementById('alertContainer');
            container.innerHTML = `
                    <div class="alert alert-${type}">
                        <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i>
                        <span>${message}</span>
                    </div>
                `;

            if (type === 'error') {
                setTimeout(() => {
                    container.innerHTML = '';
                }, 5000);
            }
        }

        // Check for remembered credentials on page load
        document.addEventListener('DOMContentLoaded', function () {
            // If already logged in, redirect immediately without adding to history
            if (typeof Auth !== 'undefined' && Auth.isLoggedIn && Auth.isLoggedIn()) {
                window.location.replace('dashboard.html');
                return;
            }

            const rememberedEmail = localStorage.getItem('rememberedEmail');
            const rememberedPassword = localStorage.getItem('rememberedPassword');
            const rememberMeChecked = localStorage.getItem('rememberMe');

            if (rememberedEmail) {
                document.getElementById('email').value = rememberedEmail;
            }

            if (rememberMeChecked === 'true' && rememberedPassword) {
                document.getElementById('rememberMe').checked = true;
                try {
                    const decryptedPassword = simpleDecrypt(rememberedPassword);
                    document.getElementById('password').value = decryptedPassword;
                } catch (e) {
                    console.error('Failed to decrypt password');
                    localStorage.removeItem('rememberedPassword');
                }
            } else {
                document.getElementById('rememberMe').checked = false;
            }
        });
    </script>
</body>

</html>
