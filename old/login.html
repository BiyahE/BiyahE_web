<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BIYAHE Bus Management System</title>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-dark: #242552;
            --primary-dark-light: #3a3b6e;
            --primary-yellow: #fde338;
            --primary-yellow-hover: #e5cc2f;
            --text-primary: #1a1d2b;
            --text-secondary: #5a6278;
            --text-muted: #8b92a8;
            --text-white: #ffffff;
            --bg-light: #f5f5f0;
            --bg-cream: #faf9f6;
            --border-light: #e5e5e0;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            --radius-full: 9999px;
            --transition-fast: 0.2s ease;
            --transition-normal: 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #e8e8e3 0%, #f0efe8 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: var(--text-primary);
        }

        /* Main Container - Split Screen Design */
        .auth-wrapper {
            width: 100%;
            max-width: 1100px;
            min-height: 700px;
            background: var(--bg-cream);
            border-radius: var(--radius-xl);
            display: grid;
            grid-template-columns: 1fr 1fr;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
        }

        /* Left Side - Form Section */
        .auth-form-section {
            padding: 60px 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
        }

        /* Logo Badge */
        .brand-badge {
            position: absolute;
            top: 30px;
            left: 50px;
            padding: 10px 20px;
            border: 1px solid var(--border-light);
            border-radius: var(--radius-full);
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            background: white;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .brand-badge i {
            color: var(--primary-yellow);
        }

        /* Form Header */
        .form-header {
            margin-bottom: 40px;
        }

        .form-header h1 {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .form-header p {
            font-size: 15px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        /* Form Elements */
        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            margin-bottom: 10px;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
        }

        .form-input {
            width: 100%;
            padding: 16px 20px;
            background: white;
            border: 1.5px solid var(--border-light);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-size: 15px;
            font-family: inherit;
            transition: all var(--transition-fast);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary-yellow);
            box-shadow: 0 0 0 4px rgba(253, 227, 56, 0.1);
        }

        .form-input::placeholder {
            color: var(--text-muted);
        }

        /* Password Field with Toggle */
        .password-wrapper {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px;
            font-size: 16px;
            transition: color var(--transition-fast);
        }

        .password-toggle:hover {
            color: var(--primary-dark);
        }

        /* Options Row */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .checkbox-wrapper input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--primary-yellow);
            cursor: pointer;
            border-radius: 4px;
        }

        .forgot-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 600;
            transition: color var(--transition-fast);
        }

        .forgot-link:hover {
            color: var(--primary-dark);
        }

        /* Submit Button */
        .btn-submit {
            width: 100%;
            padding: 16px 24px;
            background: var(--primary-yellow);
            color: var(--primary-dark);
            border: none;
            border-radius: var(--radius-md);
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all var(--transition-fast);
            margin-bottom: 24px;
            font-family: inherit;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(253, 227, 56, 0.4);
            background: var(--primary-yellow-hover);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        /* Social Login */
        .social-login {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
        }

        .btn-social {
            flex: 1;
            padding: 14px;
            background: white;
            border: 1.5px solid var(--border-light);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            cursor: pointer;
            transition: all var(--transition-fast);
            font-family: inherit;
        }

        .btn-social:hover {
            border-color: var(--primary-yellow);
            background: rgba(253, 227, 56, 0.05);
        }

        .btn-social i {
            font-size: 18px;
        }

        /* Footer */
        .form-footer {
            text-align: center;
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .form-footer a {
            color: var(--primary-dark);
            text-decoration: none;
            font-weight: 700;
            margin-left: 4px;
        }

        .form-footer a:hover {
            text-decoration: underline;
        }

        /* Terms Link */
        .terms-link {
            position: absolute;
            bottom: 30px;
            right: 50px;
            font-size: 13px;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
        }

        .terms-link:hover {
            color: var(--text-secondary);
        }

        /* Right Side - Image Section */
        .auth-image-section {
            position: relative;
            background: linear-gradient(135deg, #2a2d4a 0%, #1a1c2e 100%);
            overflow: hidden;
        }

        .auth-image-section img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.9;
        }

        /* Floating Cards */
        .floating-card {
            position: absolute;
            background: white;
            border-radius: var(--radius-md);
            padding: 16px 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            animation: float 6s ease-in-out infinite;
        }

        .floating-card.yellow {
            background: var(--primary-yellow);
            top: 80px;
            left: 40px;
            animation-delay: 0s;
        }

        .floating-card.white {
            bottom: 120px;
            left: 40px;
            animation-delay: 1s;
        }

        .floating-card.small {
            top: 50%;
            right: 30px;
            padding: 12px;
            border-radius: 50%;
            animation-delay: 2s;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
        }

        .card-dot {
            width: 8px;
            height: 8px;
            background: var(--primary-dark);
            border-radius: 50%;
        }

        .floating-card.yellow .card-dot {
            background: white;
        }

        .card-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-primary);
            margin: 0;
        }

        .floating-card.yellow .card-title {
            color: var(--primary-dark);
        }

        .card-time {
            font-size: 11px;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .floating-card.yellow .card-time {
            color: rgba(36, 37, 82, 0.8);
        }

        /* Calendar Strip */
        .calendar-strip {
            position: absolute;
            bottom: 280px;
            left: 40px;
            right: 40px;
            display: flex;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: var(--radius-md);
            padding: 16px;
        }

        .calendar-day {
            text-align: center;
            color: white;
        }

        .calendar-day span {
            display: block;
            font-size: 12px;
            opacity: 0.8;
            margin-bottom: 4px;
        }

        .calendar-day strong {
            font-size: 18px;
            font-weight: 700;
        }

        /* Avatar Stack */
        .avatar-stack {
            position: absolute;
            top: 50%;
            right: 60px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            object-fit: cover;
        }

        .avatar:nth-child(2) {
            margin-left: 20px;
        }

        /* Close Button */
        .close-btn {
            position: absolute;
            top: 24px;
            right: 24px;
            width: 36px;
            height: 36px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-fast);
            font-size: 16px;
        }

        .close-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: rotate(90deg);
        }

        /* Animations */
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        /* Alerts */
        .alert {
            padding: 14px 18px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            margin-bottom: 24px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: #059669;
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #dc2626;
        }

        /* Loading State */
        .btn-loading {
            position: relative;
            color: transparent !important;
        }

        .btn-loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid var(--primary-dark);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 900px) {
            .auth-wrapper {
                grid-template-columns: 1fr;
                max-width: 480px;
            }
            
            .auth-image-section {
                display: none;
            }
            
            .auth-form-section {
                padding: 40px 30px;
            }
            
            .brand-badge {
                position: relative;
                top: 0;
                left: 0;
                margin-bottom: 30px;
                display: inline-flex;
            }
            
            .terms-link {
                position: relative;
                bottom: auto;
                right: auto;
                text-align: center;
                display: block;
                margin-top: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="auth-wrapper">
        <!-- Left Side - Form -->
        <div class="auth-form-section">
            <div class="brand-badge">
                <i class="fas fa-bus"></i>
                Biyahe
            </div>

            <div class="form-header">
                <h1>Welcome back</h1>
                <p>Sign in to access your dashboard</p>
            </div>

            <div id="alertContainer"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <div class="input-wrapper">
                        <input type="email" class="form-input" id="email" placeholder="name@company.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="input-wrapper password-wrapper">
                        <input type="password" class="form-input" id="password" placeholder="Enter your password" required>
                        <button type="button" class="password-toggle" id="passwordToggle">
                            <i class="fas fa-eye" id="toggleIcon"></i>
                        </button>
                    </div>
                </div>

                <div class="form-options">
                    <label class="checkbox-wrapper">
                        <input type="checkbox" id="rememberMe">
                        <span>Remember me</span>
                    </label>
                    <a href="forgot-password.html" class="forgot-link">Forgot password?</a>
                </div>

                <button type="submit" class="btn-submit">Sign In</button>

                <div class="social-login">
                    <button type="button" class="btn-social">
                        <i class="fab fa-apple"></i>
                        Apple
                    </button>
                    <button type="button" class="btn-social">
                        <i class="fab fa-google"></i>
                        Google
                    </button>
                </div>
            </form>

            <div class="form-footer">
                Don't have an account?<a href="register.html">Create account</a>
            </div>

            <a href="#" class="terms-link">Terms & Conditions</a>
        </div>

        <!-- Right Side - Image with Floating Elements -->
        <div class="auth-image-section">
            <!-- Background Image -->
            <img src="https://images.unsplash.com/photo-1522071820081-009f0129c71c?w=800&auto=format&fit=crop&q=80" alt="Team collaboration">
            
            <!-- Close Button -->
            <button class="close-btn" onclick="window.location.href='index.html'">
                <i class="fas fa-times"></i>
            </button>

            <!-- Floating Cards -->
            <div class="floating-card yellow">
                <div class="card-header">
                    <div class="card-dot"></div>
                    <h4 class="card-title">Route Review</h4>
                </div>
                <div class="card-time">09:30am-10:00am</div>
            </div>

            <!-- Calendar Strip -->
            <div class="calendar-strip">
                <div class="calendar-day">
                    <span>Sun</span>
                    <strong>22</strong>
                </div>
                <div class="calendar-day">
                    <span>Mon</span>
                    <strong>23</strong>
                </div>
                <div class="calendar-day">
                    <span>Tue</span>
                    <strong>24</strong>
                </div>
                <div class="calendar-day">
                    <span>Wed</span>
                    <strong>25</strong>
                </div>
                <div class="calendar-day">
                    <span>Thu</span>
                    <strong>26</strong>
                </div>
                <div class="calendar-day">
                    <span>Fri</span>
                    <strong>27</strong>
                </div>
                <div class="calendar-day">
                    <span>Sat</span>
                    <strong>28</strong>
                </div>
            </div>

            <div class="floating-card white">
                <div class="card-header">
                    <div class="card-dot" style="background: var(--primary-yellow);"></div>
                    <h4 class="card-title">Daily Dispatch</h4>
                </div>
                <div class="card-time">12:00pm-01:00pm</div>
                <div style="margin-top: 10px; display: flex; gap: -8px;">
                    <img src="https://i.pravatar.cc/150?img=1" style="width: 28px; height: 28px; border-radius: 50%; border: 2px solid white; margin-right: -8px;" alt="">
                    <img src="https://i.pravatar.cc/150?img=2" style="width: 28px; height: 28px; border-radius: 50%; border: 2px solid white; margin-right: -8px;" alt="">
                    <img src="https://i.pravatar.cc/150?img=3" style="width: 28px; height: 28px; border-radius: 50%; border: 2px solid white;" alt="">
                </div>
            </div>

            <!-- Avatar Stack -->
            <div class="avatar-stack">
                <img src="https://i.pravatar.cc/150?img=5" class="avatar" alt="User">
                <img src="https://i.pravatar.cc/150?img=9" class="avatar" alt="User">
                <img src="https://i.pravatar.cc/150?img=12" class="avatar" alt="User">
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        // Password toggle functionality
        const passwordInput = document.getElementById('password');
        const passwordToggle = document.getElementById('passwordToggle');
        const toggleIcon = document.getElementById('toggleIcon');

        passwordToggle.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            
            if (type === 'text') {
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        });

        // Login form handler
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            const submitBtn = this.querySelector('.btn-submit');
            
            submitBtn.classList.add('btn-loading');
            submitBtn.disabled = true;
            
            setTimeout(() => {
                const result = Auth.login(email, password);
                
                if (result.success) {
                    showAlert('Login successful! Redirecting...', 'success');
                    
                    if (rememberMe) {
                        localStorage.setItem('rememberedEmail', email);
                    } else {
                        localStorage.removeItem('rememberedEmail');
                    }
                    
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 800);
                } else {
                    showAlert(result.message, 'error');
                    submitBtn.classList.remove('btn-loading');
                    submitBtn.disabled = false;
                }
            }, 600);
        });

        function showAlert(message, type) {
            const container = document.getElementById('alertContainer');
            container.innerHTML = `
                <div class="alert alert-${type}">
                    <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i>
                    <span>${message}</span>
                </div>
            `;
            
            if (type === 'error') {
                setTimeout(() => {
                    container.innerHTML = '';
                }, 5000);
            }
        }

        // Check for remembered email
        document.addEventListener('DOMContentLoaded', function() {
            const rememberedEmail = localStorage.getItem('rememberedEmail');
            if (rememberedEmail) {
                document.getElementById('email').value = rememberedEmail;
                document.getElementById('rememberMe').checked = true;
            }
        });
    </script>
</body>
</html>
