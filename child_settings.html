<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIYAHE - Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-color: #3b82f6;
            --primary-hover: #242553;
            --primary-dark: #1e40af;
            --bg-light: #f8fafc;
            --bg-gradient-start: #f1f5f9;
            --bg-gradient-end: #e2e8f0;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --border-color: #e2e8f0;
            --white: #ffffff;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --radius-sm: 0.5rem;
            --radius-md: 1rem;
            --radius-lg: 1.5rem;
            --radius-full: 9999px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #e5e7eb 0%, #fef3c7 100%);
            color: var(--text-primary);
            overflow: hidden;
        }

        /* Main Container */
        .profile-container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 1rem;
        }

        /* Card */
        .card {
            background: var(--white);
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .card:hover {
            box-shadow: var(--shadow-md);
        }

        .card-header {
            padding: 0.875rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .card-header-left {
            display: flex;
            align-items: center;
            gap: 0.625rem;
        }

        .header-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #242553 0%, #3b82f6 100%);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.875rem;
            box-shadow: 0 4px 12px rgba(36, 37, 83, 0.3);
            flex-shrink: 0;
        }

        .card-title {
            font-size: 0.9375rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.125rem;
        }

        .card-subtitle {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .card-body {
            padding: 1.5rem;
            flex: 1;
            overflow-y: auto;
        }

        /* Profile Layout */
        .profile-layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 1.5rem;
            height: 100%;
        }

        /* Sidebar Info */
        .profile-sidebar {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .avatar-section {
            background: var(--bg-light);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 1.5rem;
            text-align: center;
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #242553 0%, #3b82f6 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2rem;
            font-weight: 600;
            margin: 0 auto 1rem;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 12px rgba(36, 37, 83, 0.3);
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s;
            cursor: pointer;
        }

        .avatar:hover .avatar-overlay {
            opacity: 1;
        }

        .avatar-overlay i {
            color: white;
            font-size: 1.25rem;
        }

        .avatar-input {
            display: none;
        }

        .user-name {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.25rem;
        }

        .user-role {
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        /* Info List */
        .info-list {
            background: var(--bg-light);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            overflow: hidden;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.875rem 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        .info-item:last-child {
            border-bottom: none;
        }

        .info-icon-small {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #242553 0%, #3b82f6 100%);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.75rem;
            flex-shrink: 0;
        }

        .info-content {
            flex: 1;
            min-width: 0;
        }

        .info-label {
            font-size: 0.625rem;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.125rem;
        }

        .info-value {
            font-size: 0.8125rem;
            color: var(--text-primary);
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.25rem 0.625rem;
            border-radius: var(--radius-full);
            font-size: 0.6875rem;
            font-weight: 600;
        }

        .status-badge.active {
            background: rgba(16, 185, 129, 0.1);
            color: #059669;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .status-badge.inactive {
            background: rgba(239, 68, 68, 0.1);
            color: #dc2626;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        /* Main Content */
        .profile-main {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .section-title {
            font-size: 0.875rem;
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .section-title i {
            color: var(--primary-color);
        }

        /* Form */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.375rem;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        .form-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .form-input {
            padding: 0.625rem 0.875rem;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            font-size: 0.8125rem;
            font-family: inherit;
            background: var(--white);
            color: var(--text-primary);
            transition: all 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: #242553;
            box-shadow: 0 0 0 3px rgba(36, 37, 83, 0.1);
        }

        .form-input::placeholder {
            color: var(--text-muted);
        }

        .input-with-icon {
            position: relative;
        }

        .input-with-icon .form-input {
            padding-left: 2.25rem;
        }

        .input-icon {
            position: absolute;
            left: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        /* Buttons */
        .form-actions {
            display: flex;
            gap: 0.625rem;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border-color);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            padding: 0.5rem 1rem;
            border-radius: var(--radius-full);
            font-weight: 600;
            font-size: 0.8125rem;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            font-family: inherit;
        }

        .btn-primary {
            background: var(--primary-color);
            color: var(--white);
            box-shadow: 0 4px 6px rgba(59, 130, 246, 0.2);
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 12px rgba(59, 130, 246, 0.3);
        }

        .btn-secondary {
            background: var(--bg-light);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: var(--border-color);
            color: var(--text-primary);
        }

        .btn-danger {
            background: #ef4444;
            color: white;
            box-shadow: 0 4px 6px rgba(239, 68, 68, 0.2);
        }

        .btn-danger:hover {
            background: #dc2626;
            transform: translateY(-1px);
            box-shadow: 0 6px 12px rgba(239, 68, 68, 0.3);
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--white);
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 400px;
            padding: 1.5rem;
            transform: scale(0.95);
            opacity: 0;
            transition: all 0.2s ease;
        }

        .modal-overlay.active .modal {
            transform: scale(1);
            opacity: 1;
        }

        .modal-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .modal-icon {
            width: 48px;
            height: 48px;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ef4444;
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        .modal-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .modal-text {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }

        .modal-actions {
            display: flex;
            gap: 0.75rem;
        }

        .modal-actions .btn {
            flex: 1;
            justify-content: center;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            padding: 0.875rem 1.25rem;
            border-radius: var(--radius-md);
            font-size: 0.875rem;
            font-weight: 500;
            color: white;
            box-shadow: var(--shadow-lg);
            z-index: 2000;
            transform: translateX(150%);
            transition: transform 0.3s ease;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.success {
            background: #10b981;
        }

        .toast.error {
            background: #ef4444;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .profile-layout {
                grid-template-columns: 1fr;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .form-group.full-width {
                grid-column: 1;
            }

            .modal {
                margin: 1rem;
                max-width: calc(100% - 2rem);
            }
        }

        /* Scrollbar */
        .card-body::-webkit-scrollbar {
            width: 6px;
        }

        .card-body::-webkit-scrollbar-track {
            background: transparent;
        }

        .card-body::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }

        .card-body::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }
    </style>
</head>

<body>
    <div class="profile-container">
        <div class="card">
            <div class="card-header">
                <div class="card-header-left">
                    <div class="header-icon">
                        <i class="fas fa-user"></i>
                    </div>
                    <div>
                        <h3 class="card-title">My Profile</h3>
                        <p class="card-subtitle">Manage your account information</p>
                    </div>
                </div>
            </div>

            <div class="card-body">
                <div class="profile-layout">
                    <!-- Sidebar -->
                    <div class="profile-sidebar">
                        <!-- Avatar Section -->
                        <div class="avatar-section">
                            <div class="avatar" id="avatarPreview"
                                onclick="document.getElementById('avatarInput').click()">
                                <span id="avatarInitials">--</span>
                                <img id="avatarImg" style="display:none;">
                                <div class="avatar-overlay">
                                    <i class="fas fa-camera"></i>
                                </div>
                            </div>
                            <input type="file" id="avatarInput" class="avatar-input" accept="image/*"
                                onchange="handleAvatarUpload(event)">
                            <div class="user-name" id="settingsUserName">Loading...</div>
                            <div class="user-role" id="settingsRole">Loading...</div>
                        </div>

                        <!-- Info List -->
                        <div class="info-list">
                            <div class="info-item">
                                <div class="info-icon-small">
                                    <i class="fas fa-hashtag"></i>
                                </div>
                                <div class="info-content">
                                    <div class="info-label">Staff ID</div>
                                    <div class="info-value" id="displayStaffId">—</div>
                                </div>
                            </div>
                            <div class="info-item">
                                <div class="info-icon-small">
                                    <i class="fas fa-user-tag"></i>
                                </div>
                                <div class="info-content">
                                    <div class="info-label">Role</div>
                                    <div class="info-value" id="displayRole">—</div>
                                </div>
                            </div>
                            <div class="info-item">
                                <div class="info-icon-small">
                                    <i class="fas fa-envelope"></i>
                                </div>
                                <div class="info-content">
                                    <div class="info-label">Email</div>
                                    <div class="info-value" id="displayEmail" style="font-size: 0.75rem;">—</div>
                                </div>
                            </div>
                            <div class="info-item">
                                <div class="info-icon-small">
                                    <i class="fas fa-circle"></i>
                                </div>
                                <div class="info-content">
                                    <div class="info-label">Status</div>
                                    <div id="displayStatus">—</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Main Content -->
                    <div class="profile-main">
                        <div class="section-title">
                            <i class="fas fa-user-circle"></i>
                            Personal Information
                        </div>

                        <div class="form-grid">
                            <div class="form-group">
                                <label class="form-label">First Name</label>
                                <input type="text" class="form-input" id="firstName" placeholder="First name">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Last Name</label>
                                <input type="text" class="form-input" id="lastName" placeholder="Last name">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Email Address</label>
                                <div class="input-with-icon">
                                    <i class="fas fa-envelope input-icon"></i>
                                    <input type="email" class="form-input" id="email" placeholder="Email address">
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Phone Number</label>
                                <div class="input-with-icon">
                                    <i class="fas fa-phone input-icon"></i>
                                    <input type="tel" class="form-input" id="phone" placeholder="+63 912 345 6789">
                                </div>
                            </div>
                        </div>

                        <div class="form-actions">
                            <button class="btn btn-primary" onclick="saveProfile()">
                                <i class="fas fa-save"></i> Save Changes
                            </button>
                            <button class="btn btn-secondary" onclick="showResetModal()">
                                <i class="fas fa-undo"></i> Reset
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Reset Confirmation Modal -->
    <div class="modal-overlay" id="resetModal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-icon">
                    <i class="fas fa-exclamation-triangle"></i>
                </div>
                <h3 class="modal-title">Discard Changes?</h3>
            </div>
            <p class="modal-text">
                Are you sure you want to reset? Any unsaved changes to your profile will be lost.
            </p>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="hideResetModal()">
                    <i class="fas fa-times"></i> Cancel
                </button>
                <button class="btn btn-danger" onclick="confirmReset()">
                    <i class="fas fa-trash-alt"></i> Discard
                </button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- Scripts -->
    <script src="js/logger.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // =====================================================
        // SUPABASE
        // =====================================================
        const SUPABASE_URL = 'https://musiimheammasnmegnnt.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im11c2lpbWhlYW1tYXNubWVnbm50Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTgwMTIwMTcsImV4cCI6MjA3MzU4ODAxN30.KH2Pckv8CM9iTbYRBIzSSxt7rZFCRDhhxIf06655mm8';

        let _sb = null;
        function getSB() {
            if (!_sb) _sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            return _sb;
        }

        // =====================================================
        // HELPERS
        // =====================================================
        function getInitials(fullname) {
            if (!fullname) return 'U';
            const parts = fullname.trim().split(/\s+/);
            if (parts.length === 1) return parts[0][0].toUpperCase();
            return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
        }

        function roleLabel(role) {
            const map = {
                admin: 'Administrator',
                staff_operator: 'Staff Operator',
                staff_finance: 'Finance Staff',
                staff_loader: 'Staff Loader',
                driver: 'Driver'
            };
            return map[role] || (role || 'N/A').replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
        }

        function showToast(msg, type = 'success') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast ' + type + ' show';
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        // =====================================================
        // MODAL FUNCTIONS
        // =====================================================
        function showResetModal() {
            document.getElementById('resetModal').classList.add('active');
        }

        function hideResetModal() {
            document.getElementById('resetModal').classList.remove('active');
        }

        function confirmReset() {
            hideResetModal();
            loadUserData();
            showToast('Changes discarded');
        }

        // Close modal when clicking outside
        document.addEventListener('click', function (e) {
            if (e.target.classList.contains('modal-overlay')) {
                hideResetModal();
            }
        });

        // Close modal on Escape key
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') {
                hideResetModal();
            }
        });

        // =====================================================
        // LOAD USER DATA
        // =====================================================
        async function loadUserData() {
            let email = null;
            try {
                const stored = JSON.parse(localStorage.getItem('currentUser') || '{}');
                email = stored.email || localStorage.getItem('_se');
            } catch (e) { }

            if (!email) {
                showToast('Session not found — please log in again.', 'error');
                return;
            }

            const plainPw = localStorage.getItem('_sp');
            if (plainPw) {
                try {
                    await getSB().auth.signInWithPassword({ email, password: plainPw });
                } catch (e) { }
            }

            const { data, error } = await getSB()
                .from('Staff_Account')
                .select('id, fullname, email, role, status, created_at')
                .eq('email', email)
                .single();

            if (error || !data) {
                console.error('Failed to load Staff_Account:', error);
                showToast('Could not load account data.', 'error');
                const fallback = JSON.parse(localStorage.getItem('currentUser') || '{}');
                populateUI(fallback);
                return;
            }

            const merged = { ...JSON.parse(localStorage.getItem('currentUser') || '{}'), ...data };
            localStorage.setItem('currentUser', JSON.stringify(merged));

            populateUI(data);
        }

        function populateUI(data) {
            const fullname = data.fullname || 'User';
            const email = data.email || '';
            const role = data.role || '';
            const status = data.status || '';
            const id = data.id || '';

            document.getElementById('settingsUserName').textContent = fullname;
            document.getElementById('settingsRole').textContent = roleLabel(role);
            document.getElementById('avatarInitials').textContent = getInitials(fullname);

            document.getElementById('displayStaffId').textContent = id;
            document.getElementById('displayRole').textContent = roleLabel(role);
            document.getElementById('displayEmail').textContent = email;

            const statusEl = document.getElementById('displayStatus');
            const isActive = (status || '').toLowerCase() === 'active';
            statusEl.innerHTML = `<span class="status-badge ${isActive ? 'active' : 'inactive'}">${status || 'Unknown'}</span>`;

            const parts = fullname.trim().split(/\s+/);
            document.getElementById('firstName').value = parts[0] || '';
            document.getElementById('lastName').value = parts.length > 1 ? parts[parts.length - 1] : '';
            document.getElementById('email').value = email;

            const saved = JSON.parse(localStorage.getItem('biyaheProfile') || '{}');
            if (saved.phone) document.getElementById('phone').value = saved.phone;
        }

        // =====================================================
        // SAVE PROFILE
        // =====================================================
        async function saveProfile() {
            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            const email = document.getElementById('email').value.trim();

            if (!firstName || !email) {
                showToast('First name and email are required.', 'error');
                return;
            }

            const fullname = [firstName, lastName].filter(Boolean).join(' ');
            const currentUser = JSON.parse(localStorage.getItem('currentUser') || '{}');

            const { error } = await getSB()
                .from('Staff_Account')
                .update({ fullname, email, updated_at: new Date().toISOString() })
                .eq('id', currentUser.id);

            if (error) {
                console.error(error);
                showToast('Error saving profile: ' + error.message, 'error');
                return;
            }

            currentUser.fullname = fullname;
            currentUser.email = email;
            localStorage.setItem('currentUser', JSON.stringify(currentUser));

            localStorage.setItem('biyaheProfile', JSON.stringify({
                phone: document.getElementById('phone').value
            }));

            document.getElementById('settingsUserName').textContent = fullname;
            document.getElementById('avatarInitials').textContent = getInitials(fullname);
            document.getElementById('displayEmail').textContent = email;

            showToast('Profile updated successfully');
        }

        // =====================================================
        // AVATAR UPLOAD
        // =====================================================
        function handleAvatarUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = ev => {
                const img = document.getElementById('avatarImg');
                img.src = ev.target.result;
                img.style.display = 'block';
                document.getElementById('avatarInitials').style.display = 'none';
                showToast('Avatar updated');
            };
            reader.readAsDataURL(file);
        }

        // =====================================================
        // INIT
        // =====================================================
        document.addEventListener('DOMContentLoaded', async () => {
            await loadUserData();
        });

        (function notifyParent() {
            const filename = window.location.pathname.split('/').pop();
            const pageMap = {
                'child_dashboard.html': 'dashboard',
                'child_tracking.html': 'live-tracking',
                'child_analytics.html': 'analytics',
                'child_feedback.html': 'feedback',
                'child_bus_information.html': 'bus-info',
                'child_bus_schedule.html': 'schedule',
                'child_load.html': 'load',
                'child_top_up_reference.html': 'top-up-reference',
                'child_account_management.html': 'accounts',
                'child_finance.html': 'finance',
                'child_settings.html': 'settings',
                'child_developer_logs.html': 'developer-logs'
            };

            const pageName = pageMap[filename];
            if (pageName && window.parent !== window) {
                window.parent.postMessage({
                    type: 'pageLoaded',
                    page: pageName
                }, '*');
            }
        })();
    </script>
</body>
