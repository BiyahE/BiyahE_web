<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIYAHE - Top Up References</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-color: #3b82f6;
            --primary-hover: #242553;
            --primary-dark: #1e40af;
            --bg-light: #f8fafc;
            --bg-gradient-start: #f1f5f9;
            --bg-gradient-end: #e2e8f0;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --border-color: #e2e8f0;
            --white: #ffffff;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --radius-sm: 0.5rem;
            --radius-md: 1rem;
            --radius-lg: 1.5rem;
            --radius-xl: 2rem;
            --radius-full: 9999px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #e5e7eb 0%, #fef3c7 100%);
            color: var(--text-primary);
        }

        .topup-container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .card {
            background: var(--white);
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .card:hover {
            box-shadow: var(--shadow-md);
        }

        .card-header {
            padding: 0.875rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .card-title {
            font-size: 0.9375rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.125rem;
        }

        .card-subtitle {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .card-body {
            padding: 0.875rem;
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .card-header-left {
            display: flex;
            align-items: center;
            gap: 0.625rem;
        }

        .header-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #242553 0%, #3b82f6 100%);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.875rem;
            box-shadow: 0 4px 12px rgba(36, 37, 83, 0.3);
            flex-shrink: 0;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            padding: 0.5rem 1rem;
            border-radius: var(--radius-full);
            font-weight: 600;
            font-size: 0.8125rem;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            font-family: inherit;
            text-decoration: none;
        }

        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem;
            color: var(--text-muted);
        }

        .loading-state i {
            font-size: 2rem;
            margin-bottom: 1rem;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .search-filter-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.625rem;
            gap: 0.625rem;
            flex-wrap: wrap;
            flex-shrink: 0;
        }

        .search-box {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-box i {
            position: absolute;
            left: 0.75rem;
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        .search-box input {
            padding: 0.5rem 0.75rem 0.5rem 2rem;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-full);
            font-size: 0.75rem;
            width: 280px;
            transition: all 0.2s;
            background: var(--white);
            font-family: 'Inter', sans-serif;
        }

        .search-box input:focus {
            outline: none;
            border-color: #242553;
            box-shadow: 0 0 0 3px rgba(36, 37, 83, 0.1);
            width: 300px;
        }

        .search-box input::placeholder {
            color: var(--text-muted);
        }

        .refresh-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            padding: 0.5rem 0.875rem;
            background: var(--bg-light);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-full);
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .refresh-btn:hover {
            background: var(--border-color);
            color: var(--text-primary);
        }

        .refresh-btn i {
            transition: transform 0.3s ease;
        }

        .refresh-btn.spinning i {
            animation: spin 0.8s linear infinite;
        }

        .table-wrapper {
            overflow-y: auto;
            flex: 1;
            -webkit-overflow-scrolling: touch;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
        }

        .table-wrapper::-webkit-scrollbar {
            width: 6px;
        }

        .table-wrapper::-webkit-scrollbar-track {
            background: transparent;
        }

        .table-wrapper::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }

        .table-wrapper::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        .data-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            font-size: 0.8125rem;
        }

        .data-table th {
            background: var(--bg-light);
            padding: 0.625rem;
            font-size: 0.625rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 2px solid var(--border-color);
            cursor: pointer;
            user-select: none;
            transition: all 0.2s;
            text-align: left;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .data-table th:hover {
            background: rgba(36, 37, 83, 0.05);
            color: #242553;
        }

        .data-table td {
            padding: 0.625rem;
            font-size: 0.8125rem;
            color: var(--text-primary);
            border-bottom: 1px solid var(--border-color);
            transition: all 0.2s;
        }

        .data-table tbody tr {
            transition: all 0.2s;
        }

        .data-table tbody tr:hover {
            background: rgba(36, 37, 83, 0.02);
        }

        .data-table tbody tr:hover td {
            color: #242553;
        }

        .id-cell {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .id-icon-small {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, #242553 0%, #3b82f6 100%);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.75rem;
            flex-shrink: 0;
        }

        .amount {
            font-weight: 700;
            color: #059669;
        }

        .amount::before {
            content: '₱';
            margin-right: 0.125rem;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.25rem 0.625rem;
            border-radius: var(--radius-full);
            font-size: 0.6875rem;
            font-weight: 600;
        }

        .payment-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.25rem 0.625rem;
            border-radius: var(--radius-full);
            font-size: 0.6875rem;
            font-weight: 600;
        }

        .payment-badge.cash {
            background: rgba(16, 185, 129, 0.1);
            color: #059669;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .payment-badge.card {
            background: rgba(59, 130, 246, 0.1);
            color: #3b82f6;
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        .payment-badge.online {
            background: rgba(139, 92, 246, 0.1);
            color: #8b5cf6;
            border: 1px solid rgba(139, 92, 246, 0.2);
        }

        .payment-badge.mobile {
            background: rgba(245, 158, 11, 0.1);
            color: #d97706;
            border: 1px solid rgba(245, 158, 11, 0.2);
        }

        .payment-badge.gcash {
            background: rgba(59, 130, 246, 0.1);
            color: #3b82f6;
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        .payment-badge.maya {
            background: rgba(16, 185, 129, 0.1);
            color: #059669;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .approve-actions {
            display: flex;
            gap: 0.25rem;
        }

        .approve-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.3rem 0.75rem;
            border-radius: var(--radius-full);
            font-size: 0.75rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        .approve-btn.verify {
            background: rgba(16, 185, 129, 0.1);
            color: #059669;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .approve-btn.verify:hover {
            background: #059669;
            color: white;
        }

        .approve-btn.reject {
            background: rgba(239, 68, 68, 0.1);
            color: #dc2626;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .approve-btn.reject:hover {
            background: #dc2626;
            color: white;
        }

        .approve-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .approve-status {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.25rem 0.625rem;
            border-radius: var(--radius-full);
            font-size: 0.6875rem;
            font-weight: 600;
        }

        .approve-status.pending {
            background: rgba(245, 158, 11, 0.1);
            color: #d97706;
            border: 1px solid rgba(245, 158, 11, 0.2);
        }

        .approve-status.verified {
            background: rgba(16, 185, 129, 0.1);
            color: #059669;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .approve-status.rejected {
            background: rgba(239, 68, 68, 0.1);
            color: #dc2626;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem;
            color: var(--text-muted);
            text-align: center;
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .empty-state h4 {
            font-size: 1rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .empty-state p {
            font-size: 0.875rem;
        }

        .toast {
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            padding: 0.875rem 1.25rem;
            border-radius: var(--radius-md);
            font-size: 0.875rem;
            font-weight: 500;
            color: white;
            box-shadow: var(--shadow-lg);
            z-index: 2000;
            transform: translateX(150%);
            transition: transform 0.3s ease;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.success {
            background: #10b981;
        }

        .toast.error {
            background: #ef4444;
        }

        .realtime-indicator {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            padding: 0.25rem 0.625rem;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: var(--radius-full);
            font-size: 0.6875rem;
            font-weight: 600;
            color: #10b981;
            margin-left: 0.5rem;
        }

        .realtime-indicator i {
            font-size: 0.5rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        .realtime-connected {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            padding: 0.25rem 0.625rem;
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: var(--radius-full);
            font-size: 0.6875rem;
            font-weight: 600;
            color: #059669;
            margin-left: 0.5rem;
            transition: all 0.3s ease;
        }

        .realtime-connected i {
            font-size: 0.625rem;
        }

        .realtime-connected.connected i {
            animation: pulse 1.5s infinite;
        }

        .realtime-connected.disconnected {
            background: rgba(239, 68, 68, 0.15);
            border-color: rgba(239, 68, 68, 0.3);
            color: #dc2626;
        }

        .realtime-connected.connecting {
            background: rgba(245, 158, 11, 0.15);
            border-color: rgba(245, 158, 11, 0.3);
            color: #d97706;
        }

        .rls-error-banner {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.625rem 0.875rem;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: var(--radius-md);
            margin-bottom: 0.75rem;
            color: #dc2626;
            font-size: 0.8125rem;
            font-weight: 500;
            flex-shrink: 0;
        }

        .rls-error-banner.hidden {
            display: none;
        }


        .read-only-banner.hidden {
            display: none;
        }

        .read-only-banner i {
            font-size: 1rem;
        }

        @media (max-width: 768px) {
            .search-box input {
                width: 100%;
            }

            .search-box input:focus {
                width: 100%;
            }

            .card-header,
            .card-body {
                padding: 0.75rem;
            }

            .data-table {
                font-size: 0.75rem;
            }

            .data-table th,
            .data-table td {
                padding: 0.5rem;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .data-table tbody tr {
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes highlightNew {
            0% {
                background: rgba(16, 185, 129, 0.25);
            }

            100% {
                background: transparent;
            }
        }

        .data-table tbody tr.new-row {
            animation: highlightNew 2.5s ease-out forwards;
        }

        @keyframes flashUpdate {
            0% {
                background: rgba(59, 130, 246, 0.25);
            }

            100% {
                background: transparent;
            }
        }

        .data-table tbody tr.updated-row {
            animation: flashUpdate 2s ease-out forwards;
        }

        @keyframes flashDelete {
            0% {
                background: rgba(239, 68, 68, 0.2);
                opacity: 1;
            }

            100% {
                background: rgba(239, 68, 68, 0.05);
                opacity: 0.4;
            }
        }

        .data-table tbody tr.deleted-row {
            animation: flashDelete 0.6s ease-out forwards;
        }
    </style>
</head>

<body>
    <div class="topup-container">
        <div class="rls-error-banner hidden" id="rlsErrorBanner">
            <i class="fas fa-exclamation-triangle"></i>
            <span id="rlsErrorText">Authentication error. Please refresh and try again.</span>
        </div>

        <div class="read-only-banner hidden" id="topupReadOnlyBanner">

        </div>

        <div class="card">
            <div class="card-header">
                <div class="card-header-left">
                    <div class="header-icon">
                        <i class="fas fa-wallet"></i>
                    </div>
                    <div>
                        <h3 class="card-title">Top Up References</h3>
                        <p class="card-subtitle">Manage passenger top up requests
                            <span class="realtime-indicator"><i class="fas fa-circle"></i> LIVE</span>
                            <span class="realtime-connected connecting" id="realtimeStatus">
                                <i class="fas fa-circle-notch fa-spin"></i> Connecting...
                            </span>
                        </p>
                    </div>
                </div>
                <div style="display: flex; gap: 0.5rem;">
                    <button class="refresh-btn" id="refreshBtn" onclick="manualRefresh()">
                        <i class="fas fa-sync-alt"></i>
                        <span id="refreshText">Refresh</span>
                    </button>
                </div>
            </div>
            <div class="card-body">
                <div class="search-filter-bar">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="topupSearch" placeholder="Search by name, email, reference, type...">
                    </div>
                </div>
                <div class="table-wrapper">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Type</th>
                                <th>Full Name</th>
                                <th>Email</th>
                                <th>Amount</th>
                                <th>Payment Method</th>
                                <th>Reference No</th>
                                <th>Transaction No</th>
                                <th>Created At</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <tr>
                                <td colspan="10" style="text-align: center; padding: 3rem;">
                                    <div class="loading-state">
                                        <i class="fas fa-spinner"></i>
                                        <p>Loading top up data from database...</p>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="js/logger.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/auth.js"></script>
    <script>
        // ==========================================
        // STATE
        // ==========================================
        let topupData = [];
        let realtimeChannel = null;
        let currentUserRole = 'staff';
        let currentUser = null;
        let reconnectTimer = null;
        let reconnectAttempts = 0;
        const MAX_RECONNECT_ATTEMPTS = 10;
        const RECONNECT_DELAY_BASE = 2000; // ms, doubles each attempt up to 30s

        // ==========================================
        // INITIALIZATION
        // ==========================================
        document.addEventListener('DOMContentLoaded', async function () {
            checkUserRole();
            await waitForSupabase();

            const user = Auth.getCurrentUser();
            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            currentUser = user;
            console.log('✅ Logged in as:', currentUser.fullname, '|', currentUser.role);

            document.getElementById('topupSearch').addEventListener('input', function (e) {
                renderTable(e.target.value.toLowerCase());
            });

            await restoreSession();
            await loadData();
            setupRealtimeSubscription();
        });

        // ==========================================
        // WAIT FOR SUPABASE
        // ==========================================
        async function waitForSupabase() {
            let attempts = 0;
            while (!window.supabaseClient && attempts < 60) {
                await new Promise(r => setTimeout(r, 100));
                attempts++;
            }
            if (!window.supabaseClient) {
                console.error('❌ supabaseClient never became available after 6s');
            } else {
                console.log('✅ supabaseClient ready');
            }
        }

        // ==========================================
        // RESTORE SESSION
        // ==========================================
        async function restoreSession() {
            try {
                const { data: { session } } = await window.supabaseClient.auth.getSession();
                if (session) {
                    console.log('✅ Supabase session already active');
                    return true;
                }
            } catch (e) { }

            const _e = localStorage.getItem('_se');
            const _p = localStorage.getItem('_sp');
            if (_e && _p) {
                try {
                    const { data, error } = await window.supabaseClient.auth.signInWithPassword({ email: _e, password: _p });
                    if (!error && data.session) {
                        console.log('✅ Supabase session restored');
                        return true;
                    }
                } catch (e) { }
            }

            console.warn('⚠️ Could not restore Supabase session');
            return false;
        }

        // ==========================================
        // LOAD DATA
        // ==========================================
        async function loadData(showLoading = true) {
            if (showLoading) {
                document.getElementById('tableBody').innerHTML = `
                    <tr>
                        <td colspan="10" style="text-align: center; padding: 3rem;">
                            <div class="loading-state">
                                <i class="fas fa-spinner"></i>
                                <p>Loading top up data from database...</p>
                            </div>
                        </td>
                    </tr>`;
            }

            try {
                const { data, error } = await window.supabaseClient
                    .from('admin_notifications')
                    .select('*')
                    .order('id', { ascending: true });

                if (error) throw error;

                topupData = data || [];
                renderTable(document.getElementById('topupSearch').value.toLowerCase());

            } catch (error) {
                console.error('❌ Error loading data:', error);
                showToast('Error loading data: ' + error.message, 'error');
                document.getElementById('tableBody').innerHTML = `
                    <tr>
                        <td colspan="10" style="text-align: center; padding: 3rem;">
                            <div class="empty-state">
                                <i class="fas fa-exclamation-circle"></i>
                                <h4>Error loading data</h4>
                                <p>${error.message}</p>
                            </div>
                        </td>
                    </tr>`;
            }
        }

        async function manualRefresh() {
            const btn = document.getElementById('refreshBtn');
            const refreshText = document.getElementById('refreshText');
            btn.classList.add('spinning');
            refreshText.textContent = 'Refreshing...';
            await loadData(false);
            setTimeout(() => {
                btn.classList.remove('spinning');
                refreshText.textContent = 'Refresh';
            }, 500);
        }

        // ==========================================
        // REAL-TIME SUBSCRIPTION
        //
        // Key fix: Supabase realtime UPDATE/DELETE payloads
        // only contain `old` data if REPLICA IDENTITY FULL
        // is set on the table. Since we can't guarantee that,
        // we use a full reload strategy for updates/deletes
        // and optimistic insert for new rows. This ensures
        // the table is always in sync.
        // ==========================================
        function setRealtimeStatus(state) {
            const el = document.getElementById('realtimeStatus');
            el.className = 'realtime-connected ' + state;

            const icons = {
                connected: '<i class="fas fa-wifi"></i> Realtime',
                disconnected: '<i class="fas fa-wifi-slash"></i> Offline',
                connecting: '<i class="fas fa-circle-notch fa-spin"></i> Connecting...',
                error: '<i class="fas fa-exclamation-circle"></i> Error'
            };

            el.innerHTML = icons[state] || icons.connecting;
        }

        function setupRealtimeSubscription() {
            // Tear down any existing channel cleanly before re-creating
            if (realtimeChannel) {
                try {
                    window.supabaseClient.removeChannel(realtimeChannel);
                } catch (e) { }
                realtimeChannel = null;
            }

            if (reconnectTimer) {
                clearTimeout(reconnectTimer);
                reconnectTimer = null;
            }

            setRealtimeStatus('connecting');
            console.log('🔄 Setting up realtime subscription...');

            realtimeChannel = window.supabaseClient
                .channel('topup_realtime_v2', {
                    config: {
                        // Broadcast heartbeat every 25s to keep the connection alive
                        // (Supabase default timeout is ~60s)
                        presence: { key: '' }
                    }
                })
                .on(
                    'postgres_changes',
                    { event: 'INSERT', schema: 'public', table: 'admin_notifications' },
                    (payload) => {
                        console.log('➕ INSERT received:', payload.new);
                        handleInsert(payload.new);
                    }
                )
                .on(
                    'postgres_changes',
                    { event: 'UPDATE', schema: 'public', table: 'admin_notifications' },
                    (payload) => {
                        console.log('✏️ UPDATE received:', payload.new);
                        // payload.new always has full new row data (even without REPLICA IDENTITY FULL)
                        // payload.old may only have the PK. We use payload.new.id to find & replace.
                        handleUpdate(payload.new);
                    }
                )
                .on(
                    'postgres_changes',
                    { event: 'DELETE', schema: 'public', table: 'admin_notifications' },
                    (payload) => {
                        console.log('🗑️ DELETE received:', payload.old);
                        // payload.old only has PK columns reliably. Use id to remove from local state.
                        handleDelete(payload.old?.id);
                    }
                )
                .subscribe((status, err) => {
                    console.log('📡 Realtime status:', status, err || '');

                    if (status === 'SUBSCRIBED') {
                        setRealtimeStatus('connected');
                        reconnectAttempts = 0;
                        console.log('✅ Realtime subscription active');

                    } else if (status === 'CHANNEL_ERROR') {
                        setRealtimeStatus('error');
                        console.error('❌ Realtime channel error:', err);
                        scheduleReconnect();

                    } else if (status === 'TIMED_OUT') {
                        setRealtimeStatus('disconnected');
                        console.warn('⏱️ Realtime timed out');
                        scheduleReconnect();

                    } else if (status === 'CLOSED') {
                        setRealtimeStatus('disconnected');
                        console.warn('🔌 Realtime channel closed');
                        // Only auto-reconnect if this wasn't a deliberate teardown
                        if (realtimeChannel) {
                            scheduleReconnect();
                        }
                    }
                });
        }

        function scheduleReconnect() {
            if (reconnectAttempts >= MAX_RECONNECT_ATTEMPTS) {
                console.error('❌ Max reconnect attempts reached. Manual refresh required.');
                setRealtimeStatus('error');
                showToast('Realtime connection lost. Please refresh the page.', 'error');
                return;
            }

            // Exponential backoff: 2s, 4s, 8s, ... capped at 30s
            const delay = Math.min(RECONNECT_DELAY_BASE * Math.pow(2, reconnectAttempts), 30000);
            reconnectAttempts++;

            console.log(`🔁 Reconnecting in ${delay / 1000}s (attempt ${reconnectAttempts}/${MAX_RECONNECT_ATTEMPTS})...`);
            setRealtimeStatus('connecting');

            reconnectTimer = setTimeout(() => {
                setupRealtimeSubscription();
            }, delay);
        }

        // ==========================================
        // REALTIME EVENT HANDLERS
        // ==========================================
        function handleInsert(newRecord) {
            if (!newRecord || !newRecord.id) return;

            // Avoid duplicate if already present (e.g. from a manual refresh race)
            const exists = topupData.some(r => r.id === newRecord.id);
            if (!exists) {
                topupData.push(newRecord);
                renderTable(document.getElementById('topupSearch').value.toLowerCase(), [newRecord.id], 'new');
                showToast(`New top-up request from ${newRecord.full_name || 'Unknown'}`, 'success');
            }
        }

        function handleUpdate(newRecord) {
            if (!newRecord || !newRecord.id) {
                // Fallback: full reload if we can't identify the record
                loadData(false);
                return;
            }

            const idx = topupData.findIndex(r => r.id === newRecord.id);
            if (idx !== -1) {
                const oldRecord = topupData[idx];
                topupData[idx] = newRecord;

                // Show toast for approval status changes
                const wasPending = oldRecord.approve === null || oldRecord.approve === undefined;
                const isNowDecided = newRecord.approve !== null && newRecord.approve !== undefined;
                if (wasPending && isNowDecided) {
                    const status = newRecord.approve ? 'verified' : 'denied';
                    showToast(`Request #${newRecord.id} ${status}`, newRecord.approve ? 'success' : 'error');
                }

                renderTable(document.getElementById('topupSearch').value.toLowerCase(), [newRecord.id], 'updated');
            } else {
                // Record wasn't in our local state — insert it
                topupData.push(newRecord);
                renderTable(document.getElementById('topupSearch').value.toLowerCase(), [newRecord.id], 'new');
            }
        }

        function handleDelete(deletedId) {
            if (!deletedId) {
                // Can't identify — full reload
                loadData(false);
                return;
            }

            topupData = topupData.filter(r => r.id !== deletedId);
            renderTable(document.getElementById('topupSearch').value.toLowerCase());
        }

        // ==========================================
        // TABLE RENDERING
        // ==========================================
        function renderTable(searchTerm = '', highlightIds = [], highlightType = 'new') {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            const term = (searchTerm || '').toLowerCase();

            const filtered = topupData.filter(row => {
                const searchFields = [
                    String(row.id ?? ''),
                    String(row.reference_no ?? ''),
                    String(row.transaction_no ?? ''),
                    String(row.full_name ?? ''),
                    String(row.email ?? ''),
                    String(row.type ?? ''),
                    String(row.payment_method ?? '')
                ].join(' ').toLowerCase();
                return searchFields.includes(term);
            });

            if (filtered.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="10" style="text-align: center; padding: 3rem;">
                            <div class="empty-state">
                                <i class="fas fa-wallet"></i>
                                <h4>No records found</h4>
                                <p>${term ? 'No matches for your search.' : 'No top up records in database.'}</p>
                            </div>
                        </td>
                    </tr>`;
                return;
            }

            filtered.forEach((row, index) => {
                const tr = document.createElement('tr');
                tr.style.animationDelay = `${index * 0.03}s`;
                tr.dataset.id = row.id;

                if (highlightIds.includes(row.id)) {
                    tr.classList.add(highlightType === 'updated' ? 'updated-row' : 'new-row');
                }

                const paymentClass = String(row.payment_method ?? 'cash').toLowerCase().replace(/\s+/g, '');
                const isAdmin = currentUserRole === 'admin';
                const isPending = row.approve === null || row.approve === undefined;

                let actionContent;
                if (isAdmin) {
                    actionContent = isPending
                        ? '<span class="approve-status pending"><i class="fas fa-clock"></i> Pending</span>'
                        : row.approve === true
                            ? '<span class="approve-status verified"><i class="fas fa-check-circle"></i> Verified</span>'
                            : '<span class="approve-status rejected"><i class="fas fa-times-circle"></i> Rejected</span>';
                } else {
                    if (isPending) {
                        actionContent = `
                            <div class="approve-actions">
                                <button class="approve-btn verify" onclick="handleApproval(${row.id}, true)">
                                    <i class="fas fa-check"></i> Verify
                                </button>
                                <button class="approve-btn reject" onclick="handleApproval(${row.id}, false)">
                                    <i class="fas fa-times"></i> Reject
                                </button>
                            </div>`;
                    } else {
                        actionContent = row.approve === true
                            ? '<span class="approve-status verified"><i class="fas fa-check-circle"></i> Verified</span>'
                            : '<span class="approve-status rejected"><i class="fas fa-times-circle"></i> Rejected</span>';
                    }
                }

                let displayType = row.type ?? '-';
                if (displayType === 'top_up_approval') displayType = 'Top-up Approval';

                let formattedDateTime = '-';
                if (row.created_at) {
                    const date = new Date(row.created_at);
                    const datePart = date.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
                    const timePart = date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
                    formattedDateTime = `${datePart}, ${timePart}`;
                }

                tr.innerHTML = `
                    <td>
                        <div class="id-cell">
                            <div class="id-icon-small"><i class="fas fa-hashtag"></i></div>
                            <span>${row.id ?? '-'}</span>
                        </div>
                    </td>
                    <td>${displayType}</td>
                    <td>${row.full_name ?? '-'}</td>
                    <td>${row.email ?? '-'}</td>
                    <td class="amount">${parseFloat(row.amount || 0).toFixed(2)}</td>
                    <td><span class="payment-badge ${paymentClass}">${row.payment_method || '-'}</span></td>
                    <td>${row.reference_no ?? '-'}</td>
                    <td>${row.transaction_no ?? '-'}</td>
                    <td>${formattedDateTime}</td>
                    <td>${actionContent}</td>
                `;

                tbody.appendChild(tr);
            });
        }

        // ==========================================
        // APPROVAL HANDLER
        // ==========================================
        async function handleApproval(id, approved) {
            if (currentUserRole === 'admin') {
                showToast('Admin has view-only access.', 'error');
                return;
            }

            const buttons = document.querySelectorAll(`button[onclick*="handleApproval(${id}"]`);
            buttons.forEach(b => b.disabled = true);

            try {
                console.log(`🔄 Processing approval for ID ${id}, approved=${approved}`);

                const { data: notifRecord, error: notifError } = await window.supabaseClient
                    .from('admin_notifications')
                    .select('reference_no')
                    .eq('id', id)
                    .single();

                if (notifError) throw notifError;

                const statusValue = approved ? 'verified' : 'denied';

                const { error: adminError } = await window.supabaseClient
                    .from('admin_notifications')
                    .update({ approve: approved })
                    .eq('id', id);

                if (adminError) throw adminError;

                if (notifRecord?.reference_no) {
                    await window.supabaseClient
                        .from('top_up_references')
                        .update({ status: statusValue })
                        .eq('reference_no', notifRecord.reference_no);
                }

                // Realtime will handle the UI update — no need to re-render here.
                showToast(approved ? ' Request verified successfully' : 'Request rejected', approved ? 'success' : 'error');

            } catch (error) {
                console.error('❌ Approval error:', error);
                showToast('Failed to update: ' + error.message, 'error');
                buttons.forEach(b => b.disabled = false);
            }
        }

        // ==========================================
        // AUTH HELPERS
        // ==========================================
        function getCurrentUserData() {
            try {
                const userData = localStorage.getItem('userData');
                if (userData) return JSON.parse(userData);
                if (typeof Auth !== 'undefined' && Auth.getCurrentUser) return Auth.getCurrentUser();
            } catch (e) {
                console.error('Error getting user data:', e);
            }
            return null;
        }

        function checkUserRole() {
            const user = getCurrentUserData();
            if (user?.role) currentUserRole = user.role;

            const banner = document.getElementById('topupReadOnlyBanner');
            if (currentUserRole === 'admin') {
                banner.classList.remove('hidden');
            } else {
                banner.classList.add('hidden');
            }
        }

        // ==========================================
        // TOAST
        // ==========================================
        let toastTimer = null;
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            if (toastTimer) clearTimeout(toastTimer);
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            toastTimer = setTimeout(() => toast.classList.remove('show'), 3500);
        }

        // ==========================================
        // CLEANUP
        // ==========================================
        window.addEventListener('beforeunload', () => {
            if (reconnectTimer) clearTimeout(reconnectTimer);
            if (realtimeChannel) {
                // Signal teardown so scheduleReconnect won't fire
                const ch = realtimeChannel;
                realtimeChannel = null;
                window.supabaseClient.removeChannel(ch);
                console.log('🧹 Cleaned up realtime subscription');
            }
        });

        // ==========================================
        // PARENT FRAME NOTIFICATION
        // ==========================================
        (function notifyParent() {
            const filename = window.location.pathname.split('/').pop();
            const pageMap = {
                'child_dashboard.html': 'dashboard',
                'child_tracking.html': 'live-tracking',
                'child_analytics.html': 'analytics',
                'child_feedback.html': 'feedback',
                'child_bus_information.html': 'bus-info',
                'child_bus_schedule.html': 'schedule',
                'child_load.html': 'load',
                'child_top_up_reference.html': 'top-up-reference',
                'child_account_management.html': 'accounts',
                'child_child_finance.html': 'finance',
                'child_settings.html': 'settings',
                'child_developer_logs.html': 'developer-logs'
            };
            const pageName = pageMap[filename];
            if (pageName && window.parent !== window) {
                window.parent.postMessage({ type: 'pageLoaded', page: pageName }, '*');
            }
        })();
    </script>
