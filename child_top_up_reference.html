<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIYAHE - Top Up References</title>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-color: #3b82f6;
            --primary-hover: #242553;
            --primary-dark: #1e40af;
            --bg-light: #f8fafc;
            --bg-gradient-start: #f1f5f9;
            --bg-gradient-end: #e2e8f0;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --border-color: #e2e8f0;
            --white: #ffffff;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --radius-sm: 0.5rem;
            --radius-md: 1rem;
            --radius-lg: 1.5rem;
            --radius-xl: 2rem;
            --radius-full: 9999px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #e5e7eb 0%, #fef3c7 100%);
            color: var(--text-primary);
        }

        /* Main Container */
        .topup-container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Cards */
        .card {
            background: var(--white);
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .card:hover {
            box-shadow: var(--shadow-md);
        }

        .card-header {
            padding: 0.875rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .card-title {
            font-size: 0.9375rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.125rem;
        }

        .card-subtitle {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .card-body {
            padding: 0.875rem;
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Card Header Left */
        .card-header-left {
            display: flex;
            align-items: center;
            gap: 0.625rem;
        }

        .header-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #242553 0%, #3b82f6 100%);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.875rem;
            box-shadow: 0 4px 12px rgba(36, 37, 83, 0.3);
            flex-shrink: 0;
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            padding: 0.5rem 1rem;
            border-radius: var(--radius-full);
            font-weight: 600;
            font-size: 0.8125rem;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            font-family: inherit;
            text-decoration: none;
        }

        .btn-primary {
            background: var(--primary-color);
            color: var(--white);
            box-shadow: 0 4px 6px rgba(59, 130, 246, 0.2);
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 12px rgba(59, 130, 246, 0.3);
        }

        .btn-secondary {
            background: var(--bg-light);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: var(--border-color);
            color: var(--text-primary);
        }

        .btn-success {
            background: #10b981;
            color: white;
            box-shadow: 0 4px 6px rgba(16, 185, 129, 0.2);
        }

        .btn-success:hover {
            background: #059669;
            transform: translateY(-1px);
            box-shadow: 0 6px 12px rgba(16, 185, 129, 0.3);
        }

        .btn-danger {
            background: #ef4444;
            color: white;
            box-shadow: 0 4px 6px rgba(239, 68, 68, 0.2);
        }

        .btn-danger:hover {
            background: #dc2626;
            transform: translateY(-1px);
            box-shadow: 0 6px 12px rgba(239, 68, 68, 0.3);
        }

        .btn-sm {
            padding: 0.375rem 0.75rem;
            font-size: 0.75rem;
        }

        .btn-icon {
            width: 28px;
            height: 28px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            border-radius: var(--radius-sm);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.875rem;
        }

        .btn-icon:hover {
            background: var(--bg-light);
            color: var(--primary-color);
            transform: scale(1.1);
        }

        /* Loading State */
        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem;
            color: var(--text-muted);
        }

        .loading-state i {
            font-size: 2rem;
            margin-bottom: 1rem;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }



        /* Search Filter Bar */
        .search-filter-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.625rem;
            gap: 0.625rem;
            flex-wrap: wrap;
            flex-shrink: 0;
        }

        .search-box {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-box i {
            position: absolute;
            left: 0.75rem;
            color: var(--text-muted);
            font-size: 0.875rem;
        }

        .search-box input {
            padding: 0.5rem 0.75rem 0.5rem 2rem;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-full);
            font-size: 0.75rem;
            width: 280px;
            transition: all 0.2s;
            background: var(--white);
            font-family: 'Inter', sans-serif;
        }

        .search-box input:focus {
            outline: none;
            border-color: #242553;
            box-shadow: 0 0 0 3px rgba(36, 37, 83, 0.1);
            width: 300px;
        }

        .search-box input::placeholder {
            color: var(--text-muted);
        }

        /* Refresh Button */
        .refresh-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            padding: 0.5rem 0.875rem;
            background: var(--bg-light);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-full);
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .refresh-btn:hover {
            background: var(--border-color);
            color: var(--text-primary);
        }

        .refresh-btn i {
            transition: transform 0.3s ease;
        }

        .refresh-btn.spinning i {
            animation: spin 0.8s linear infinite;
        }

        /* Table */
        .table-wrapper {
            overflow-y: auto;
            flex: 1;
            -webkit-overflow-scrolling: touch;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
        }

        /* Custom scrollbar */
        .table-wrapper::-webkit-scrollbar {
            width: 6px;
        }

        .table-wrapper::-webkit-scrollbar-track {
            background: transparent;
        }

        .table-wrapper::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }

        .table-wrapper::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        .data-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            font-size: 0.8125rem;
        }

        .data-table th {
            background: var(--bg-light);
            padding: 0.625rem;
            font-size: 0.625rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 2px solid var(--border-color);
            cursor: pointer;
            user-select: none;
            transition: all 0.2s;
            text-align: left;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .data-table th:hover {
            background: rgba(36, 37, 83, 0.05);
            color: #242553;
        }

        .data-table td {
            padding: 0.625rem;
            font-size: 0.8125rem;
            color: var(--text-primary);
            border-bottom: 1px solid var(--border-color);
            transition: all 0.2s;
        }

        .data-table tbody tr {
            transition: all 0.2s;
        }

        .data-table tbody tr:hover {
            background: rgba(36, 37, 83, 0.02);
        }

        .data-table tbody tr:hover td {
            color: #242553;
        }

        /* ID Cell */
        .id-cell {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .id-icon-small {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, #242553 0%, #3b82f6 100%);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.75rem;
            flex-shrink: 0;
        }

        /* Amount styling */
        .amount {
            font-weight: 700;
            color: #059669;
        }

        .amount::before {
            content: '₱';
            margin-right: 0.125rem;
        }

        /* Status Badges */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.25rem 0.625rem;
            border-radius: var(--radius-full);
            font-size: 0.6875rem;
            font-weight: 600;
        }

        .status-badge.pending {
            background: rgba(245, 158, 11, 0.1);
            color: #d97706;
            border: 1px solid rgba(245, 158, 11, 0.2);
        }

        .status-badge.verified {
            background: rgba(16, 185, 129, 0.1);
            color: #059669;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .status-badge.rejected {
            background: rgba(239, 68, 68, 0.1);
            color: #dc2626;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        /* Payment Method Badge */
        .payment-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.25rem 0.625rem;
            border-radius: var(--radius-full);
            font-size: 0.6875rem;
            font-weight: 600;
        }

        .payment-badge.cash {
            background: rgba(16, 185, 129, 0.1);
            color: #059669;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .payment-badge.card {
            background: rgba(59, 130, 246, 0.1);
            color: #3b82f6;
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        .payment-badge.online {
            background: rgba(139, 92, 246, 0.1);
            color: #8b5cf6;
            border: 1px solid rgba(139, 92, 246, 0.2);
        }

        .payment-badge.mobile {
            background: rgba(245, 158, 11, 0.1);
            color: #d97706;
            border: 1px solid rgba(245, 158, 11, 0.2);
        }

        /* Actions Cell */
        .actions-cell {
            display: flex;
            gap: 0.375rem;
        }

        .approve-actions {
            display: flex;
            gap: 0.25rem;
        }

        .approve-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.3rem 0.75rem;
            border-radius: var(--radius-full);
            font-size: 0.75rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        .approve-btn.verify {
            background: rgba(16, 185, 129, 0.1);
            color: #059669;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .approve-btn.verify:hover {
            background: #059669;
            color: white;
        }

        .approve-btn.reject {
            background: rgba(239, 68, 68, 0.1);
            color: #dc2626;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .approve-btn.reject:hover {
            background: #dc2626;
            color: white;
        }

        .approve-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .approve-status {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.25rem 0.625rem;
            border-radius: var(--radius-full);
            font-size: 0.6875rem;
            font-weight: 600;
        }

        .approve-status.verified {
            background: rgba(16, 185, 129, 0.1);
            color: #059669;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .approve-status.rejected {
            background: rgba(239, 68, 68, 0.1);
            color: #dc2626;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        /* Empty State */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem;
            color: var(--text-muted);
            text-align: center;
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .empty-state h4 {
            font-size: 1rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .empty-state p {
            font-size: 0.875rem;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            padding: 0.875rem 1.25rem;
            border-radius: var(--radius-md);
            font-size: 0.875rem;
            font-weight: 500;
            color: white;
            box-shadow: var(--shadow-lg);
            z-index: 2000;
            transform: translateX(150%);
            transition: transform 0.3s ease;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.success {
            background: #10b981;
        }

        .toast.error {
            background: #ef4444;
        }

        /* Real-time indicator */
        .realtime-indicator {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            padding: 0.25rem 0.625rem;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: var(--radius-full);
            font-size: 0.6875rem;
            font-weight: 600;
            color: #10b981;
            margin-left: 0.5rem;
        }

        .realtime-indicator i {
            font-size: 0.5rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        /* Error Banner */
        .rls-error-banner {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.625rem 0.875rem;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: var(--radius-md);
            margin-bottom: 0.75rem;
            color: #dc2626;
            font-size: 0.8125rem;
            font-weight: 500;
            flex-shrink: 0;
        }

        .rls-error-banner.hidden {
            display: none;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .topup-container {
                padding: 0.5rem;
            }

            .search-box input {
                width: 100%;
            }

            .search-box input:focus {
                width: 100%;
            }

            .card-header,
            .card-body {
                padding: 0.75rem;
            }

            .data-table {
                font-size: 0.75rem;
            }

            .data-table th,
            .data-table td {
                padding: 0.5rem;
            }
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .data-table tbody tr {
            animation: fadeIn 0.3s ease-out;
        }
    </style>
</head>

<body>
    <div class="topup-container">
        <!-- RLS Error Banner -->
        <div class="rls-error-banner hidden" id="rlsErrorBanner">
            <i class="fas fa-exclamation-triangle"></i>
            <span id="rlsErrorText">Authentication error. Please refresh and try again.</span>
        </div>

        <!-- Read-only banner for admin -->
        <div class="read-only-banner hidden" id="topupReadOnlyBanner">

        </div>

        <div class="card">
            <div class="card-header">
                <div class="card-header-left">
                    <div class="header-icon">
                        <i class="fas fa-wallet"></i>
                    </div>
                    <div>
                        <h3 class="card-title">Top Up References</h3>
                        <p class="card-subtitle">Manage passenger top up requests
                            <span class="realtime-indicator"><i class="fas fa-circle"></i> LIVE</span>
                        </p>
                    </div>
                </div>
                <div style="display: flex; gap: 0.5rem;">
                    <button class="refresh-btn" id="refreshBtn" onclick="refreshData()">
                        <i class="fas fa-sync-alt"></i>
                        Refresh
                    </button>
                </div>
            </div>
            <div class="card-body">
                <div class="search-filter-bar">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="topupSearch" placeholder="Search by name, email, reference, type...">
                    </div>
                </div>
                <div class="table-wrapper">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Type</th>
                                <th>Full Name</th>
                                <th>Email</th>
                                <th>Amount</th>
                                <th>Payment Method</th>
                                <th>Reference No</th>
                                <th>Transaction No</th>
                                <th>Created At</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <tr>
                                <td colspan="10" style="text-align: center; padding: 3rem;">
                                    <div class="loading-state">
                                        <i class="fas fa-spinner"></i>
                                        <p>Loading top up data from database...</p>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast"></div>


    <!-- Add this BEFORE any other scripts -->
    <script src="js/logger.js"></script>
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/auth.js"></script>
    <script>
        // ==========================================
        // STATE
        // ==========================================
        let topupData = [];
        let notifData = [];
        let realtimeChannel = null;
        let notifChannel = null;
        let currentUserRole = 'staff';
        let currentUser = null;

        // ==========================================
        // INITIALIZATION
        // ==========================================
        document.addEventListener('DOMContentLoaded', async function () {
            checkUserRole();

            // Wait for auth.js to finish setting up supabaseClient
            await waitForSupabase();

            // Simple auth guard
            const user = Auth.getCurrentUser();
            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            currentUser = user;
            console.log('✅ Logged in as:', currentUser.fullname, '|', currentUser.role);

            // Search listener
            document.getElementById('topupSearch').addEventListener('input', function (e) {
                renderTable(e.target.value.toLowerCase());
            });

            // Restore Supabase Auth session
            await restoreSession();

            // Load data
            await loadData();

            // Subscribe to real-time updates
            setupRealtimeSubscription();
        });

        // Wait for supabaseClient to be ready
        async function waitForSupabase() {
            let attempts = 0;
            while (!window.supabaseClient && attempts < 60) {
                await new Promise(r => setTimeout(r, 100));
                attempts++;
            }
            if (!window.supabaseClient) {
                console.error('❌ supabaseClient never became available after 6s');
            } else {
                console.log('✅ supabaseClient ready');
            }
        }

        // Restore Supabase Auth session
        async function restoreSession() {
            try {
                const { data: { session } } = await window.supabaseClient.auth.getSession();
                if (session) {
                    console.log('✅ Supabase session already active');
                    return true;
                }
            } catch (e) { }

            const _e = localStorage.getItem('_se');
            const _p = localStorage.getItem('_sp');
            if (_e && _p) {
                try {
                    const { data, error } = await window.supabaseClient.auth.signInWithPassword({ email: _e, password: _p });
                    if (!error && data.session) {
                        console.log('✅ Supabase session restored');
                        return true;
                    }
                } catch (e) { }
            }

            console.warn('⚠️ Could not restore Supabase session');
            return false;
        }

        // ==========================================
        // TOP UP DATA LOADING
        // ==========================================
        async function loadData(showLoading = true) {
            if (showLoading) {
                document.getElementById('tableBody').innerHTML = `
                    <tr>
                        <td colspan="10" style="text-align: center; padding: 3rem;">
                            <div class="loading-state">
                                <i class="fas fa-spinner"></i>
                                <p>Loading top up data from database...</p>
                            </div>
                        </td>
                    </tr>
                `;
            }

            try {
                const result = await window.supabaseClient
                    .from('admin_notifications')
                    .select('*')
                    .order('id', { ascending: true });

                if (result.error) throw result.error;

                topupData = result.data || [];
                renderTable();

            } catch (error) {
                console.error('❌ Error loading data:', error);
                showToast('Error: ' + error.message, 'error');
                document.getElementById('tableBody').innerHTML = `
                    <tr>
                        <td colspan="10" style="text-align: center; padding: 3rem;">
                            <div class="empty-state">
                                <i class="fas fa-exclamation-circle"></i>
                                <h4>Error loading data</h4>
                                <p>${error.message}</p>
                            </div>
                        </td>
                    </tr>
                `;
            }
        }

        async function refreshData() {
            const btn = document.getElementById('refreshBtn');
            btn.classList.add('spinning');
            await loadData(false);
            setTimeout(() => btn.classList.remove('spinning'), 500);
        }

        // ==========================================
        // TABLE RENDERING
        // ==========================================
        function renderTable(searchTerm = '') {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            const filtered = topupData.filter(row => {
                const searchFields = [
                    String(row.id ?? ''),
                    String(row.reference_no ?? ''),
                    String(row.transaction_no ?? ''),
                    String(row.full_name ?? ''),
                    String(row.email ?? ''),
                    String(row.type ?? ''),
                    String(row.payment_method ?? '')
                ].join(' ').toLowerCase();

                return searchFields.includes(searchTerm.toLowerCase());
            });

            if (filtered.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="10" style="text-align: center; padding: 3rem;">
                            <div class="empty-state">
                                <i class="fas fa-wallet"></i>
                                <h4>No records found</h4>
                                <p>${searchTerm ? 'No matches for your search.' : 'No top up records in database.'}</p>
                            </div>
                        </td>
                    </tr>
                `;
                return;
            }

            filtered.forEach((row, index) => {
                const tr = document.createElement('tr');
                tr.style.animationDelay = `${index * 0.05}s`;

                const paymentClass = String(row.payment_method ?? 'cash').toLowerCase();

                // Action column: show buttons if pending, show status if already approved/rejected
                const isPending = row.approve === null || row.approve === undefined;
                const isAdmin = currentUserRole === 'admin';

                let actionContent;
                if (isAdmin) {
                    // Admin: View only, show status
                    actionContent = isPending
                        ? '<span class="approve-status pending"><i class="fas fa-clock"></i> Pending</span>'
                        : row.approve === true
                            ? '<span class="approve-status verified"><i class="fas fa-check-circle"></i> Verified</span>'
                            : '<span class="approve-status rejected"><i class="fas fa-times-circle"></i> Rejected</span>';
                } else {
                    // Other roles: Can approve/reject
                    actionContent = isPending
                        ? `<div class="approve-actions">
                            <button class="approve-btn verify" onclick="handleApproval(${row.id}, true)">
                                <i class="fas fa-check"></i> Verify
                            </button>
                            <button class="approve-btn reject" onclick="handleApproval(${row.id}, false)">
                                <i class="fas fa-times"></i> Reject
                            </button>
                           </div>`
                        : row.approve === true
                            ? '<span class="approve-status verified"><i class="fas fa-check-circle"></i> Verified</span>'
                            : '<span class="approve-status rejected"><i class="fas fa-times-circle"></i> Rejected</span>';
                }

                // Format type for display
                let displayType = row.type ?? '-';
                if (displayType === 'top_up_approval') {
                    displayType = 'Top-up Approval';
                }

                // Format date and time to 12-hour format
                let formattedDateTime = '-';
                if (row.created_at) {
                    const date = new Date(row.created_at);
                    const datePart = date.toLocaleDateString('en-US', {
                        year: 'numeric',
                        month: 'short',
                        day: 'numeric'
                    });
                    const timePart = date.toLocaleTimeString('en-US', {
                        hour: '2-digit',
                        minute: '2-digit',
                        hour12: true
                    });
                    formattedDateTime = `${datePart}, ${timePart}`;
                }

                tr.innerHTML = `
                    <td>
                        <div class="id-cell">
                            <div class="id-icon-small">
                                <i class="fas fa-hashtag"></i>
                            </div>
                            <span>${row.id ?? '-'}</span>
                        </div>
                    </td>
                    <td>${displayType}</td>
                    <td>${row.full_name ?? '-'}</td>
                    <td>${row.email ?? '-'}</td>
                    <td class="amount">${parseFloat(row.amount || 0).toFixed(2)}</td>
                    <td><span class="payment-badge ${paymentClass}">${row.payment_method || '-'}</span></td>
                    <td>${row.reference_no ?? '-'}</td>
                    <td>${row.transaction_no ?? '-'}</td>
                    <td>${formattedDateTime}</td>
                    <td>${actionContent}</td>
                `;

                tbody.appendChild(tr);
            });
        }

        // ==========================================
        // REAL-TIME SUBSCRIPTION
        // ==========================================
        function setupRealtimeSubscription() {
            realtimeChannel = window.supabaseClient
                .channel('admin_notif_main_changes')
                .on('postgres_changes',
                    { event: '*', schema: 'public', table: 'admin_notifications' },
                    (payload) => {
                        console.log('Real-time update:', payload);
                        handleRealtimeUpdate(payload);
                    }
                )
                .subscribe();
        }

        function handleRealtimeUpdate(payload) {
            const { eventType, new: newRecord, old: oldRecord } = payload;

            switch (eventType) {
                case 'INSERT':
                    topupData.push(newRecord);
                    break;
                case 'UPDATE':
                    const idx = topupData.findIndex(r => r.id === oldRecord.id);
                    if (idx !== -1) topupData[idx] = newRecord;
                    break;
                case 'DELETE':
                    topupData = topupData.filter(r => r.id !== oldRecord.id);
                    break;
            }

            renderTable(document.getElementById('topupSearch').value);
        }

        // ==========================================
        // APPROVAL HANDLER
        // ==========================================
        async function handleApproval(id, approved) {
            // Check if admin (read-only)
            if (currentUserRole === 'admin') {
                showToast('Admin has view-only access. Cannot approve or reject requests.', 'error');
                return;
            }

            // Disable buttons immediately
            const buttons = document.querySelectorAll(`button[onclick*="handleApproval(${id}"]`);
            buttons.forEach(b => b.disabled = true);

            try {
                console.log(`🔄 Processing approval for ID ${id}, approved=${approved}`);

                // Get the reference_no from admin_notifications
                const { data: notificationRecord, error: notifError } = await window.supabaseClient
                    .from('admin_notifications')
                    .select('reference_no')
                    .eq('id', id)
                    .single();

                if (notifError) throw notifError;

                const statusValue = approved ? 'verified' : 'denied';

                // Update admin_notifications (approve only)
                const { error: adminError } = await window.supabaseClient
                    .from('admin_notifications')
                    .update({ approve: approved })
                    .eq('id', id);

                if (adminError) throw adminError;

                // Update top_up_references (status)
                if (notificationRecord && notificationRecord.reference_no) {
                    await window.supabaseClient
                        .from('top_up_references')
                        .update({ status: statusValue })
                        .eq('reference_no', notificationRecord.reference_no);
                }

                // Update local data
                topupData = topupData.map(r => r.id === id ? { ...r, approve: approved } : r);

                renderTable(document.getElementById('topupSearch').value);

                showToast(approved ? 'Request verified successfully' : 'Request rejected', approved ? 'success' : 'error');

            } catch (error) {
                console.error('❌ Approval error:', error);
                showToast('Failed to update: ' + error.message, 'error');
                buttons.forEach(b => b.disabled = false);
            }
        }


        // ==========================================
        // AUTHENTICATION HELPERS
        // ==========================================
        function getCurrentUserData() {
            try {
                const userData = localStorage.getItem('userData');
                if (userData) {
                    return JSON.parse(userData);
                }

                if (typeof Auth !== 'undefined' && Auth.getCurrentUser) {
                    return Auth.getCurrentUser();
                }
            } catch (e) {
                console.error('Error getting user data:', e);
            }
            return null;
        }

        function checkUserRole() {
            const user = getCurrentUserData();
            if (user && user.role) {
                currentUserRole = user.role;
            }

            const banner = document.getElementById('topupReadOnlyBanner');

            if (currentUserRole === 'admin') {
                banner.classList.remove('hidden');
            } else {
                banner.classList.add('hidden');
            }
        }

        // ==========================================
        // UTILITY FUNCTIONS
        // ==========================================
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            if (realtimeChannel) window.supabaseClient.removeChannel(realtimeChannel);
        });
        (function notifyParent() {
            const filename = window.location.pathname.split('/').pop();
            const pageMap = {
                'child_dashboard.html': 'dashboard',
                'child_tracking.html': 'live-tracking',
                'child_analytics.html': 'analytics',
                'child_feedback.html': 'feedback',
                'child_bus_information.html': 'bus-info',
                'child_bus_schedule.html': 'schedule',
                'child_load.html': 'load',
                'child_top_up_reference.html': 'top-up-reference',
                'child_account_management.html': 'accounts',
                'child_finance.html': 'finance',
                'child_settings.html': 'settings',
                'child_developer_logs.html': 'developer-logs'
            };

            const pageName = pageMap[filename];
            if (pageName && window.parent !== window) {
                window.parent.postMessage({
                    type: 'pageLoaded',
                    page: pageName
                }, '*');
            }
        })();
    </script>
</body>
